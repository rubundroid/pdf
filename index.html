<!doctype html>
<html lang="ml">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart PDF Compressor | Fast & Secure</title>

    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#007bff" />

    <meta property="og:title" content="Smart PDF Compressor" />
    <meta
      property="og:description"
      content="രേഖകളുടെ ക്ലാരിറ്റി നഷ്ടപ്പെടാതെ, എളുപ്പത്തിൽ PDF ഫയലുകൾ കംപ്രസ്സ് ചെയ്യാം. ബ്ലാക്ക് ആൻഡ് വൈറ്റ്, മാജിക് മോഡുകൾ ലഭ്യമാണ്."
    />
    <meta
      property="og:image"
      content="https://pdf.rubundroid.com/icon-512.png"
    />
    <meta property="og:url" content="https://pdf.rubundroid.com/" />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Smart PDF Compressor" />
    <meta
      name="twitter:description"
      content="ക്ലാരിറ്റി നഷ്ടപ്പെടാതെ PDF ഫയലുകൾ കംപ്രസ്സ് ചെയ്യാം."
    />
    <meta
      name="twitter:image"
      content="https://pdf.rubundroid.com/icon-512.png"
    />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        padding: 20px;
        background-color: #f4f7f6;
      }
      .container {
        max-width: 600px;
        margin: 0 auto;
        background: white;
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      }
      h2 {
        color: #333;
        text-align: center;
      }
      input[type="file"],
      select {
        margin-bottom: 20px;
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 15px;
      }
      button {
        width: 100%;
        padding: 12px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 16px;
        cursor: pointer;
        margin-bottom: 10px;
        font-weight: bold;
      }
      button:hover {
        background-color: #0056b3;
      }
      button:disabled {
        background-color: #cccccc;
        cursor: not-allowed;
      }
      #status {
        margin-top: 15px;
        font-weight: bold;
        text-align: center;
        color: #d9534f;
      }
      .info {
        font-size: 14px;
        color: #666;
        margin-bottom: 20px;
        text-align: center;
        line-height: 1.5;
      }
      .counter-box {
        text-align: center;
        margin-top: 25px;
        font-size: 14px;
        color: #555;
        padding-top: 15px;
        border-top: 1px solid #eee;
      }
      .counter-box strong {
        color: #007bff;
        font-size: 16px;
      }
      .limit-btn-container {
        display: flex;
        gap: 15px;
        margin-top: 15px;
        width: 100%;
      }
      .outline-btn {
        flex: 1;
        padding: 12px;
        background-color: #ffffff;
        color: #007bff;
        border: 2px solid #007bff;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
      }
      .outline-btn:hover {
        background-color: #f0f7ff;
        box-shadow: 0 4px 10px rgba(0, 123, 255, 0.15);
        transform: translateY(-2px);
      }
      .outline-btn:disabled {
        border-color: #cccccc;
        color: #888888;
        cursor: not-allowed;
        transform: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>PDF Compressor</h2>
      <div class="info">
        Please select a file <br />
        to compress
      </div>

      <select id="colorMode">
        <option value="ma" selected>Magic Mode (High Clarity Default)</option>
        <option value="bw">Black & White</option>
        <option value="color">Color (Standard Mode)</option>
      </select>

      <input type="file" id="pdfInput" accept="application/pdf" />
      <button id="compressBtn" onclick="processPDF()">Compress</button>
      <div class="limit-btn-container">
        <button
          id="btn200"
          class="outline-btn"
          onclick="compressToTarget(198, this)"
        >
          ⚡ 200 KB Limit
        </button>
        <button
          id="btn100"
          class="outline-btn"
          onclick="compressToTarget(98, this)"
        >
          ⚡ 100 KB Limit
        </button>
      </div>
      <div id="status"></div>

      <div class="counter-box" id="counterContainer" style="display: none">
        Total files compressed so far:
        <strong id="countDisplay">...</strong>
      </div>
    </div>

    <script>
      const counterNamespace = "rubundroid-pdf-compressor";
      const counterKey = "total-compressions";

      fetch(`https://api.counterapi.dev/v1/${counterNamespace}/${counterKey}`)
        .then((response) => response.json())
        .then((data) => {
          if (data.count && data.count > 0) {
            document.getElementById("countDisplay").innerText = data.count;
            document.getElementById("counterContainer").style.display = "block";
          }
        })
        .catch((error) => {
          console.log("Counter blocked by browser or ad-blocker.");
          document.getElementById("counterContainer").style.display = "none";
        });

      pdfjsLib.GlobalWorkerOptions.workerSrc =
        "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js";

      async function processPDF() {
        const fileInput = document.getElementById("pdfInput");
        const statusDiv = document.getElementById("status");
        const btn = document.getElementById("compressBtn");
        const colorMode = document.getElementById("colorMode").value;

        if (fileInput.files.length === 0) {
          statusDiv.innerText = "Select a PDF file to proceed.";
          return;
        }

        const file = fileInput.files[0];
        btn.disabled = true;
        statusDiv.style.color = "#007bff";
        statusDiv.innerText = "Processing, please wait...";

        try {
          const arrayBuffer = await file.arrayBuffer();
          const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;

          const { jsPDF } = window.jspdf;
          let newPdf;

          for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
            const page = await pdf.getPage(pageNum);
            const scaleValue = colorMode === "color" ? 1.2 : 1.5;
            const viewport = page.getViewport({ scale: scaleValue });

            const canvas = document.createElement("canvas");
            const ctx = canvas.getContext("2d");
            canvas.width = viewport.width;
            canvas.height = viewport.height;

            await page.render({ canvasContext: ctx, viewport: viewport })
              .promise;

            if (colorMode === "ma" || colorMode === "bw") {
              const imageData = ctx.getImageData(
                0,
                0,
                canvas.width,
                canvas.height,
              );
              const data = imageData.data;

              for (let i = 0; i < data.length; i += 4) {
                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];

                let gray = 0.299 * r + 0.587 * g + 0.114 * b;

                if (colorMode === "ma") {
                  if (gray > 200) {
                    data[i] = 255;
                    data[i + 1] = 255;
                    data[i + 2] = 255;
                  } else {
                    data[i] = Math.max(0, r - 20);
                    data[i + 1] = Math.max(0, g - 20);
                    data[i + 2] = Math.max(0, b - 20);
                  }
                } else if (colorMode === "bw") {
                  data[i] = gray;
                  data[i + 1] = gray;
                  data[i + 2] = gray;
                }
              }
              ctx.putImageData(imageData, 0, 0);
            }

            let quality = 0.8;
            let imgData = canvas.toDataURL("image/jpeg", quality);
            let sizeInKB = (imgData.length * 0.75) / 1024;

            while (sizeInKB > 95 && quality > 0.1) {
              quality -= 0.1;
              imgData = canvas.toDataURL("image/jpeg", quality);
              sizeInKB = (imgData.length * 0.75) / 1024;
            }

            const orientation = canvas.width > canvas.height ? "l" : "p";

            if (pageNum === 1) {
              newPdf = new jsPDF(orientation, "mm", "a4");
            } else {
              newPdf.addPage("a4", orientation);
            }

            const pdfWidth = newPdf.internal.pageSize.getWidth();
            const pdfHeight = (canvas.height * pdfWidth) / canvas.width;

            newPdf.addImage(imgData, "JPEG", 0, 0, pdfWidth, pdfHeight);

            statusDiv.innerText = `Compressing page ${pageNum} of ${pdf.numPages}...`;
          }

          const pdfBlob = newPdf.output("blob");
          const totalSizeKB = pdfBlob.size / 1024;

          let displaySize = "";
          let sizeInMB = totalSizeKB / 1024;

          if (totalSizeKB >= 1024) {
            displaySize = sizeInMB.toFixed(2) + " MB";
          } else {
            displaySize = Math.round(totalSizeKB) + " KB";
          }

          if (sizeInMB > 9.9) {
            statusDiv.style.color = "#d9534f";
            statusDiv.innerText = `Warning: File size is ${displaySize}. It needs to be split into 2 files to upload!`;
          } else {
            statusDiv.style.color = "green";
            statusDiv.innerText = `Success! New size: ${displaySize}. Downloading...`;

            let filePrefix =
              colorMode === "ma" ? "MA" : colorMode === "bw" ? "BW" : "CO";
            newPdf.save(filePrefix + file.name);

            fetch(
              `https://api.counterapi.dev/v1/${counterNamespace}/${counterKey}/up`,
            )
              .then((response) => response.json())
              .then((data) => {
                if (data.count) {
                  document.getElementById("countDisplay").innerText =
                    data.count;

                  document.getElementById("counterContainer").style.display =
                    "block";
                }
              })
              .catch((error) => {
                console.log("Counter update blocked by browser.", error);
              });
          }
        } catch (error) {
          console.error(error);
          statusDiv.style.color = "#d9534f";
          statusDiv.innerText =
            "An error occurred. Please check the file and try again.";
        } finally {
          btn.disabled = false;
        }
      }
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("./sw.js")
            .then((reg) => console.log("Service Worker Registered"))
            .catch((err) => console.log("Service Worker Error", err));
        });
      }

      async function compressToTarget(targetKB, btnElement) {
        const fileInput = document.querySelector('input[type="file"]');
        const statusDiv = document.getElementById("status");

        const colorMode = document.getElementById("colorMode").value;

        if (!fileInput || !fileInput.files.length) {
          statusDiv.style.color = "#d9534f";
          statusDiv.innerText = "Please select a file to compress.";
          return;
        }

        const file = fileInput.files[0];
        let displayLimit = targetKB === 98 ? "100" : "200";

        const allBtns = document.querySelectorAll("button");
        allBtns.forEach((b) => (b.disabled = true));

        statusDiv.style.color = "#007bff";
        statusDiv.innerText = `Compressing to ${displayLimit} KB limit... Please wait.`;

        try {
          const arrayBuffer = await file.arrayBuffer();
          const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
          const numPages = pdf.numPages;

          if (
            (targetKB === 98 && numPages > 3) ||
            (targetKB === 198 && numPages > 6)
          ) {
            statusDiv.style.color = "#d9534f";
            statusDiv.innerText = `This file has too many pages to be compressed below ${displayLimit} KB. Please use the main Compress button.`;
            allBtns.forEach((b) => (b.disabled = false));
            return;
          }

          const { jsPDF } = window.jspdf;
          const canvases = [];

          for (let pageNum = 1; pageNum <= numPages; pageNum++) {
            const page = await pdf.getPage(pageNum);
            const viewport = page.getViewport({ scale: 1.2 });
            const canvas = document.createElement("canvas");
            const ctx = canvas.getContext("2d");

            canvas.width = viewport.width;
            canvas.height = viewport.height;

            await page.render({ canvasContext: ctx, viewport: viewport })
              .promise;

            const imgDataRaw = ctx.getImageData(
              0,
              0,
              canvas.width,
              canvas.height,
            );
            const data = imgDataRaw.data;

            if (colorMode === "ma" || colorMode === "bw") {
              for (let i = 0; i < data.length; i += 4) {
                let r = data[i],
                  g = data[i + 1],
                  b = data[i + 2];
                let gray = 0.299 * r + 0.587 * g + 0.114 * b;

                if (colorMode === "ma") {
                  gray = gray > 150 ? 255 : gray - 50;
                  if (gray < 0) gray = 0;
                } else {
                  gray = gray > 128 ? 255 : 0;
                }
                data[i] = data[i + 1] = data[i + 2] = gray;
              }
              ctx.putImageData(imgDataRaw, 0, 0);
            }
            canvases.push(canvas);
          }

          let quality = 0.8;
          let finalBlob;
          let newPdf;
          let sizeInKB = 999;

          while (quality > 0.05) {
            newPdf = new jsPDF();

            for (let i = 0; i < canvases.length; i++) {
              const canvas = canvases[i];
              const imgData = canvas.toDataURL("image/jpeg", quality);

              if (i > 0) newPdf.addPage();
              const pdfWidth = newPdf.internal.pageSize.getWidth();
              const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
              newPdf.addImage(imgData, "JPEG", 0, 0, pdfWidth, pdfHeight);
            }

            finalBlob = newPdf.output("blob");
            sizeInKB = finalBlob.size / 1024;

            if (sizeInKB <= targetKB) {
              break;
            }
            quality -= 0.1;
          }

          let prefix = targetKB === 98 ? "TE" : "NO";
          newPdf.save(prefix + file.name);

          statusDiv.style.color = "green";
          statusDiv.innerText = `Success! New size: ${sizeInKB.toFixed(2)} KB. Downloading...`;

          fetch(
            `https://api.counterapi.dev/v1/rubundroid-pdf-compressor/total-compressions/up`,
          )
            .then((response) => response.json())
            .then((data) => {
              if (data.count) {
                document.getElementById("countDisplay").innerText = data.count;
                document.getElementById("counterContainer").style.display =
                  "block";
              }
            })
            .catch((e) => console.log("Counter blocked"));
        } catch (error) {
          console.error(error);
          statusDiv.style.color = "#d9534f";
          statusDiv.innerText = "An error occurred. Please try again.";
        } finally {
          allBtns.forEach((b) => (b.disabled = false));
        }
      }
    </script>
  </body>
</html>
