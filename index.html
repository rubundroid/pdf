<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Compressor (High Clarity)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f4f7f6; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { color: #333; text-align: center; }
        input[type="file"] { margin-bottom: 20px; width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; margin-bottom: 10px; }
        button:hover { background-color: #0056b3; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }
        #status { margin-top: 15px; font-weight: bold; text-align: center; color: #d9534f; }
        .info { font-size: 14px; color: #666; margin-bottom: 20px; text-align: center; line-height: 1.5; }
    </style>
</head>
<body>

<div class="container">
    <h2>PDF Compressor</h2>
    <div class="info">
        <b>B&W High Clarity Mode:</b> കംപ്രസ് ചെയ്യാനുള്ള ഫയല്‍ .<br>
        തിരഞ്ഞെടുക്കുക.
    </div>
    
    <input type="file" id="pdfInput" accept="application/pdf">
    <button id="compressBtn" onclick="processPDF()">കംപ്രസ് ചെയ്യുക</button>
    <div id="status"></div>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    async function processPDF() {
        const fileInput = document.getElementById('pdfInput');
        const statusDiv = document.getElementById('status');
        const btn = document.getElementById('compressBtn');

        if (fileInput.files.length === 0) {
            statusDiv.innerText = "ദയവായി ഒരു PDF ഫയൽ തിരഞ്ഞെടുക്കുക.";
            return;
        }

        const file = fileInput.files[0];
        btn.disabled = true;
        statusDiv.style.color = "#007bff";
        statusDiv.innerText = "പ്രോസസ്സ് ചെയ്യുന്നു... ദയവായി കാത്തിരിക്കുക.";

        try {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            
            const { jsPDF } = window.jspdf;
            let newPdf;

            for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                const page = await pdf.getPage(pageNum);
                
                // ക്ലാരിറ്റി കൂട്ടാൻ Scale 1.5 ആക്കി നൽകുന്നു
                const viewport = page.getViewport({ scale: 1.5 }); 
                
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = viewport.width;
                canvas.height = viewport.height;

                await page.render({ canvasContext: ctx, viewport: viewport }).promise;

                // --- IMAGE PROCESSING (Grayscale & Thresholding) ---
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;
                
                for (let i = 0; i < data.length; i += 4) {
                    const r = data[i];
                    const g = data[i + 1];
                    const b = data[i + 2];
                    
                    // Grayscale ലേക്ക് മാറ്റുന്നു
                    let gray = 0.299 * r + 0.587 * g + 0.114 * b;
                    
                    // Thresholding: പശ്ചാത്തലം പൂർണ്ണമായും വെളുപ്പിക്കുന്നു, അക്ഷരങ്ങൾ കറുപ്പിക്കുന്നു
                    if (gray > 200) {
                        gray = 255; // ഇളം നിറങ്ങളെ പൂർണ്ണമായി വെളുപ്പിക്കുന്നു (Background)
                    } else {
                        gray = Math.max(0, gray - 20); // അക്ഷരങ്ങളെ കൂടുതൽ ഡാർക്ക് ആക്കുന്നു
                    }

                    data[i] = gray;     // R
                    data[i + 1] = gray; // G
                    data[i + 2] = gray; // B
                }
                ctx.putImageData(imageData, 0, 0);
                // --------------------------------------------------

                // ഓട്ടോമാറ്റിക് ക്വാളിറ്റി അഡ്ജസ്റ്റ്മെന്റ് (Grayscale ആയതിനാൽ ഉയർന്ന ക്വാളിറ്റി നൽകാം)
                let quality = 0.8; 
                let imgData = canvas.toDataURL('image/jpeg', quality);
                let sizeInKB = (imgData.length * 0.75) / 1024; 

                // 95 KB ക്ക് താഴെയാകുന്നത് വരെ ലൂപ്പ് ചെയ്യും
                while (sizeInKB > 95 && quality > 0.1) {
                    quality -= 0.1; 
                    imgData = canvas.toDataURL('image/jpeg', quality);
                    sizeInKB = (imgData.length * 0.75) / 1024;
                }
                
                const orientation = canvas.width > canvas.height ? 'l' : 'p';

                if (pageNum === 1) {
                    newPdf = new jsPDF(orientation, 'mm', 'a4');
                } else {
                    newPdf.addPage('a4', orientation);
                }
                
                const pdfWidth = newPdf.internal.pageSize.getWidth();
                const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
                
                newPdf.addImage(imgData, 'JPEG', 0, 0, pdfWidth, pdfHeight);
                
                statusDiv.innerText = `പേജ് ${pageNum} / ${pdf.numPages} കംപ്രസ്സ് ചെയ്തു... (സൈസ്: ${Math.round(sizeInKB)} KB)`;
            }

            const pdfBlob = newPdf.output('blob');
            const sizeInMB = pdfBlob.size / (1024 * 1024);

            if (sizeInMB > 9.9) {
                statusDiv.style.color = "#d9534f";
                statusDiv.innerText = `മുന്നറിയിപ്പ്: ഫയൽ സൈസ് ${sizeInMB.toFixed(2)} MB ആണ്. ഇത് 2 ഫയലുകളായി സ്പ്ലിറ്റ് ചെയ്യേണ്ടതുണ്ട്!`;
            } else {
                statusDiv.style.color = "green";
                statusDiv.innerText = `വിജയകരം! പുതിയ സൈസ്: ${sizeInMB.toFixed(2)} MB. ഡൗൺലോഡ് ആകുന്നു...`;
                newPdf.save('COM' + file.name);
            }

        } catch (error) {
            console.error(error);
            statusDiv.style.color = "#d9534f";
            statusDiv.innerText = "ഒരു എറർ സംഭവിച്ചു. കൺസോൾ പരിശോധിച്ച് വീണ്ടും ശ്രമിക്കുക.";
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
