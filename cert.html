<!doctype html>
<html lang="ml">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>e-Certificate Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f4f7f6;
        margin: 0;
        padding: 20px;
      }

      .top-section {
        background: #fff;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        margin-bottom: 20px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 15px;
      }
      .input-group {
        display: flex;
        flex-direction: column;
      }
      label {
        font-weight: 600;
        font-size: 0.85em;
        color: #555;
        margin-bottom: 5px;
      }
      input[type="text"] {
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 14px;
      }

      .main-container {
        display: flex;
        gap: 20px;
      }

      .left-panel {
        width: 35%;
        background: #fff;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        height: fit-content;
      }

      /* Certificate List Styles */
      #checkboxContainer {
        max-height: 400px;
        overflow-y: auto;
        margin-bottom: 15px;
        padding-right: 5px;
      }
      .cert-item {
        display: flex;
        align-items: flex-start;
        margin-bottom: 10px;
        padding: 10px;
        background: #f9f9f9;
        border: 1px solid #e0e0e0;
        border-radius: 6px;
      }
      .cert-item input[type="checkbox"] {
        margin-top: 4px;
        margin-right: 10px;
        width: 18px;
        height: 18px;
        cursor: pointer;
      }
      .cert-text {
        font-size: 13px;
        color: #333;
        line-height: 1.4;
        flex-grow: 1;
        cursor: pointer;
      }
      .cert-actions {
        margin-left: 10px;
        display: flex;
        gap: 5px;
        flex-shrink: 0;
      }
      .action-btn {
        background: none;
        border: none;
        cursor: pointer;
        font-size: 14px;
        padding: 2px 5px;
        border-radius: 3px;
      }
      .action-btn:hover {
        background: #e0e0e0;
      }

      /* Add New Certificate Styles */
      .add-new-box {
        background: #f0f4f8;
        padding: 15px;
        border-radius: 6px;
        border: 1px dashed #0072ff;
      }
      textarea {
        width: 100%;
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
        resize: vertical;
        min-height: 60px;
        margin-bottom: 10px;
        font-family: inherit;
      }

      .actions {
        margin-top: 20px;
        display: flex;
        gap: 10px;
      }
      .btn {
        flex: 1;
        padding: 10px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
        font-size: 14px;
      }
      .btn-pdf {
        background: #d32f2f;
        color: white;
      }
      .btn-text {
        background: #1976d2;
        color: white;
      }
      .btn-add {
        background: #0072ff;
        color: white;
        width: 100%;
      }

      /* Right Panel - A4 Preview */
      .right-panel {
        width: 65%;
        display: flex;
        justify-content: center;
      }
      .a4-page {
        background: #fff;
        width: 210mm;
        min-height: 297mm; /* height മാറി പഴയതുപോലെ ആക്കി */
        padding: 15mm 20mm; /* മുകളിൽ നിന്നുള്ള സ്പേസ് അല്പം കുറച്ചു */
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        box-sizing: border-box;
        position: relative;
      }
      .cert-header {
        font-family: "Times New Roman", Times, serif;
        text-align: center;
        font-weight: bold;
        font-size: 1.4em;
        margin-bottom: 10px;
        text-transform: uppercase;
      }
      .cert-title {
        font-family: "Times New Roman", Times, serif;
        text-align: center;
        font-weight: bold;
        font-size: 1.2em;
        margin-bottom: 30px;
        text-decoration: underline;
      }
      .cert-body {
        font-family: "Times New Roman", Times, serif;
        line-height: 1.8;
        font-size: 14px;
        min-height: 150mm;
        outline: none;
        background: #fafafa;
        padding: 10px;
        border-radius: 4px;
      }
      .cert-body ol {
        padding-left: 20px;
        margin: 0;
      }
      .cert-body li {
        margin-bottom: 10px;
        text-align: justify;
      }

      .cert-footer {
        font-family: "Times New Roman", Times, serif;
        display: flex;
        justify-content: space-between;
        margin-top: 40px;
        font-size: 14px;
      }
      .date-place {
        margin-top: 50px;
      }
      .signature-area {
        text-align: center;
        width: 250px;
      }
      .sign-space {
        height: 70px;
      }
      .designation,
      .pen-number {
        font-weight: bold;
        margin: 2px 0;
      }
      .placeholder-text {
        color: #888;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <div class="top-section">
      <div class="input-group">
        <label>Office Name</label>
        <input
          type="text"
          id="officeInput"
          value="Govt: Ayurveda Dispensary Angadippuram"
          oninput="updatePreview()"
        />
      </div>
      <div class="input-group">
        <label>Officer Name</label>
        <input
          type="text"
          id="officerInput"
          value="Dr. BARDEESHA K P"
          oninput="updatePreview()"
        />
      </div>
      <div class="input-group">
        <label>Designation</label>
        <input
          type="text"
          id="desigInput"
          value="Medical Officer HG"
          oninput="updatePreview()"
        />
      </div>
      <div class="input-group">
        <label>PEN Number</label>
        <input
          type="text"
          id="penInput"
          value="771713"
          oninput="updatePreview()"
        />
      </div>
    </div>

    <div class="main-container">
      <div class="left-panel">
        <h3 style="margin-top: 0; margin-bottom: 15px; font-size: 16px">
          Select Certificates
        </h3>

        <div id="checkboxContainer"></div>

        <div class="add-new-box">
          <label>Add New Certificate Master</label>
          <textarea
            id="newCertText"
            placeholder="പുതിയ സർട്ടിഫിക്കറ്റ് ഇവിടെ ടൈപ്പ് ചെയ്യുക..."
          ></textarea>
          <button class="btn btn-add" onclick="addCertificate()">
            + Add to List
          </button>
        </div>
        <div
          class="add-new-box"
          style="border-color: #2e7d32; background: #e8f5e9; margin-top: 15px"
        >
          <label style="color: #2e7d32"
            >Add Images for Manual Signing (Optional)</label
          >

          <label style="font-weight: normal; margin-top: 5px"
            >Ink Signature (Transparent PNG best)</label
          >
          <input
            type="file"
            id="signInput"
            accept="image/*"
            onchange="handleImageUpload(this, 'sign')"
          />

          <label style="font-weight: normal; margin-top: 10px"
            >Office Round Seal (Transparent PNG best)</label
          >
          <input
            type="file"
            id="sealInput"
            accept="image/*"
            onchange="handleImageUpload(this, 'seal')"
          />

          <label style="font-weight: normal; margin-top: 10px"
            >Designation Seal (Transparent PNG best)</label
          >
          <input
            type="file"
            id="desigSealInput"
            accept="image/*"
            onchange="handleImageUpload(this, 'desigSeal')"
          />

          <button
            class="btn btn-outline"
            style="margin-top: 10px; padding: 5px; font-size: 12px"
            onclick="clearImages()"
          >
            Clear All Images
          </button>
        </div>
        <div class="actions">
          <button class="btn btn-pdf" onclick="downloadPDF()">
            Download PDF
          </button>
          <button class="btn btn-text" onclick="copyText()">
            Copy as Text
          </button>
        </div>
      </div>

      <div class="right-panel">
        <div class="a4-page" id="certificate-content">
          <div class="cert-header" id="outOffice">
            Govt: Ayurveda Dispensary Angadippuram
          </div>
          <div class="cert-title">CERTIFICATES</div>

          <div class="cert-body" id="outText" contenteditable="true">
            <div class="placeholder-text">
              Please select certificates from the left panel...
            </div>
          </div>

          <div class="cert-footer">
            <div class="date-place">
              <b>Dated:</b> <span id="currentDate"></span>
            </div>
            <div class="signature-area">
              <div class="sign-space"></div>
              <p class="designation" id="outOfficer">Dr. BARDEESHA K P</p>
              <p class="pen-number">PEN <span id="outPen">771713</span></p>
              <p class="designation" id="outDesig">Medical Officer HG</p>
              <p class="designation" id="outOfficeSign">
                Govt: Ayurveda Dispensary Angadippuram
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      // അപ്‌ലോഡ് ചെയ്ത ഇമേജ് ഡാറ്റ സ്റ്റോർ ചെയ്യാൻ
      let imgData = {
        sign: null,
        seal: null,
        desigSeal: null,
      };

      // ഫയൽ അപ്‌ലോഡ് ഹാൻഡിൽ ചെയ്യാനും Base64 ആക്കാനും
      function handleImageUpload(input, type) {
        const file = input.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = function (e) {
            // Base64 ഡാറ്റ വേരിയബിളിലേക്ക് സേവ് ചെയ്യുന്നു
            imgData[type] = e.target.result;
            alert(
              type.toUpperCase() +
                " image uploaded successfully. Download PDF to see it.",
            );
            // പ്രിവ്യൂവിൽ കാണിക്കാൻ ആഗ്രഹമുണ്ടെങ്കിൽ ഇവിടെ `<img>` ടാഗ് അപ്ഡേറ്റ് ചെയ്യാം
          };
          reader.readAsDataURL(file);
        }
      }

      // അപ്‌ലോഡ് ചെയ്ത ഇമേജുകൾ ഡിലീറ്റ് ചെയ്യാൻ
      function clearImages() {
        imgData = { sign: null, seal: null, desigSeal: null };
        document.getElementById("signInput").value = "";
        document.getElementById("sealInput").value = "";
        document.getElementById("desigSealInput").value = "";
        alert("All uploaded images cleared.");
      }
      document.getElementById("currentDate").innerText =
        new Date().toLocaleDateString("en-GB");

      // ഡിഫോൾട്ട് സർട്ടിഫിക്കറ്റുകൾ (ലോക്കൽ സ്റ്റോറേജിൽ ഒന്നുമില്ലെങ്കിൽ ഇത് വരും)
      const defaultCerts = [
        "Certified that the NPS particulars of this bill verified and found in accordance with Circular No. 68/2025/Fin dated 03.09.2025.",
        "Certified that the SLI and GIS particulars of this bill verified and found as per the slab.",
        "Certified that the Salary for January 2026 of all employees of this office has been claimed.",
        "Certified that Statutory Deductions have been made.",
        "Certified that the Festival Allowance/Bonus/Advance for All employees (Including retired employees) of this office has been claimed and disbursed to their respective TSB/Bank account.",
        "Certified that the Salary of All employees included in the Bill has been credited to their respective e-TSB / Bank Account.",
        "Certified that Gross and Net Amount of each claim has been detailed and shown in bill and Net claim amount has been credited to E-TSB Account.",
        "Certified that Negative Amount is not claimed in the submitted bills.",
        "Certified that 1/12th of the calculated annual Income Tax has been deducted from the salaries of all employees who are liable to pay tax.",
        "Certified that no employee in this bill participated in the strike held on 12-02-2026. Therefore, no salary deduction is required to be made on account of 'dies-non' as per G.O.(P) No. 2/2026/GAD dated 11-02-2026.",
      ];

      // ലോക്കൽ സ്റ്റോറേജിൽ നിന്നും സർട്ടിഫിക്കറ്റുകൾ എടുക്കുന്നു
      let savedCertificates =
        JSON.parse(localStorage.getItem("myCertificates")) || defaultCerts;

      // UI-ൽ സർട്ടിഫിക്കറ്റ് ലിസ്റ്റ് കാണിക്കാനുള്ള ഫംഗ്ഷൻ
      function renderCertificates() {
        const container = document.getElementById("checkboxContainer");
        container.innerHTML = ""; // നിലവിലുള്ളവ ക്ലിയർ ചെയ്യുന്നു

        savedCertificates.forEach((cert, index) => {
          const label = document.createElement("label");
          label.className = "cert-item";

          label.innerHTML = `
                <input type="checkbox" value="${index}" onchange="buildPreview()">
                <span class="cert-text" onclick="this.previousElementSibling.click()">${cert}</span>
                <div class="cert-actions">
                    <button class="action-btn" title="Edit" onclick="editCertificate(${index}, event)">✏️</button>
                    <button class="action-btn" title="Delete" onclick="deleteCertificate(${index}, event)">🗑️</button>
                </div>
            `;
          container.appendChild(label);
        });
        buildPreview(); // ലിസ്റ്റ് മാറുമ്പോൾ പ്രിവ്യൂവും അപ്ഡേറ്റ് ചെയ്യുന്നു
      }

      // പുതിയ സർട്ടിഫിക്കറ്റ് ചേർക്കാൻ
      function addCertificate() {
        const newText = document.getElementById("newCertText").value.trim();
        if (newText !== "") {
          savedCertificates.push(newText);
          saveData();
          document.getElementById("newCertText").value = ""; // ടെക്സ്റ്റ് ബോക്സ് ക്ലിയർ ചെയ്യുന്നു
        }
      }

      // സർട്ടിഫിക്കറ്റ് എഡിറ്റ് ചെയ്യാൻ
      function editCertificate(index, event) {
        event.preventDefault(); // ചെക്ക് ബോക്സ് ടിക്ക് ആവാതിരിക്കാൻ
        const currentText = savedCertificates[index];
        const updatedText = prompt("Edit Certificate:", currentText);

        if (updatedText !== null && updatedText.trim() !== "") {
          savedCertificates[index] = updatedText.trim();
          saveData();
        }
      }

      // സർട്ടിഫിക്കറ്റ് ഡിലീറ്റ് ചെയ്യാൻ
      function deleteCertificate(index, event) {
        event.preventDefault();
        if (confirm("Are you sure you want to delete this certificate?")) {
          savedCertificates.splice(index, 1);
          saveData();
        }
      }

      // ഡാറ്റ ലോക്കൽ സ്റ്റോറേജിൽ സേവ് ചെയ്യാനും UI പുതുക്കാനും
      function saveData() {
        localStorage.setItem(
          "myCertificates",
          JSON.stringify(savedCertificates),
        );
        renderCertificates();
      }

      function updatePreview() {
        document.getElementById("outOffice").innerText =
          document.getElementById("officeInput").value;
        document.getElementById("outOfficeSign").innerText =
          document.getElementById("officeInput").value;
        document.getElementById("outOfficer").innerText =
          document.getElementById("officerInput").value;
        document.getElementById("outDesig").innerText =
          document.getElementById("desigInput").value;
        document.getElementById("outPen").innerText =
          document.getElementById("penInput").value;
      }

      // ടിക്ക് ചെയ്തവ പ്രിവ്യൂവിൽ കൊണ്ടുവരാൻ
      function buildPreview() {
        const checkboxes = document.querySelectorAll(
          '#checkboxContainer input[type="checkbox"]:checked',
        );
        const textDiv = document.getElementById("outText");

        if (checkboxes.length === 0) {
          textDiv.innerHTML =
            '<div class="placeholder-text">Please select certificates from the left panel...</div>';
          return;
        }

        let html = "<ol>";
        checkboxes.forEach((cb) => {
          const certIndex = cb.value;
          html += `<li>${savedCertificates[certIndex]}</li>`;
        });
        html += "</ol>";

        textDiv.innerHTML = html;
      }

      function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({
          orientation: "portrait",
          unit: "mm",
          format: "a4",
        });

        const officeName = document.getElementById("officeInput").value;
        const officerName = document.getElementById("officerInput").value;
        const desig = document.getElementById("desigInput").value;
        const pen = document.getElementById("penInput").value;
        const dateStr = document.getElementById("currentDate").innerText;

        const marginX = 20;
        let y = 30;
        const pageWidth = doc.internal.pageSize.getWidth();

        // 1. ഹെഡിങ് (Office Name)
        doc.setFont("times", "bold");
        doc.setFontSize(14);
        const splitOffice = doc.splitTextToSize(
          officeName.toUpperCase(),
          pageWidth - 40,
        );
        splitOffice.forEach((line) => {
          doc.text(line, pageWidth / 2, y, { align: "center" });
          y += 7;
        });

        y += 5;
        // 2. ടൈറ്റിൽ (CERTIFICATES)
        doc.setFontSize(12);
        doc.text("CERTIFICATES", pageWidth / 2, y, { align: "center" });
        const textWidth = doc.getTextWidth("CERTIFICATES");
        doc.line(
          (pageWidth - textWidth) / 2,
          y + 1,
          (pageWidth + textWidth) / 2,
          y + 1,
        );

        y += 15;

        // 3. സർട്ടിഫിക്കറ്റ് കണ്ടൻ്റ്
        doc.setFont("times", "normal");
        const listItems = document.querySelectorAll("#outText li");
        if (listItems.length === 0) {
          alert("Please select certificates.");
          return;
        }

        listItems.forEach((li, index) => {
          const text = `${index + 1}. ${li.innerText}`;
          const lines = doc.splitTextToSize(text, pageWidth - marginX * 2);
          if (y + lines.length * 6 > 240) {
            doc.addPage();
            y = 20;
          }
          doc.text(lines, marginX, y);
          y += lines.length * 6 + 4;
        });

        // ---------------------------------------------------------
        // 4. സീലുകളും ഒപ്പും ക്രമീകരിക്കുന്ന ഭാഗം (Footer Area)
        // ---------------------------------------------------------

        y += 15; // സർട്ടിഫിക്കറ്റ് വരികൾ കഴിഞ്ഞുള്ള ഗ്യാപ്പ്

        // താഴെ സീൽ വെക്കാൻ 40mm എങ്കിലും സ്ഥലം വേണം. ഇല്ലെങ്കിൽ പുതിയ പേജ് എടുക്കും.
        if (y > 240) {
          doc.addPage();
          y = 30;
        }

        const footerY = y; // ഈ ലൈൻ ബേസ് ചെയ്താണ് ബാക്കി എല്ലാം വെക്കുന്നത്

        // --- LEFT SIDE: Office Round Seal (o) & Date ---
        if (imgData.seal) {
          // റൗണ്ട് സീൽ ഇടത് വശത്ത് (X: 25, Y: footerY)
          doc.addImage(imgData.seal, "PNG", 25, footerY, 30, 30);
        }

        doc.setFont("times", "bold");
        doc.setFontSize(11);
        // തിയ്യതി റൗണ്ട് സീലിന് താഴെയായി വരാൻ (Y: footerY + 35)
        doc.text(`Dated: ${dateStr}`, marginX, footerY + 35);

        // --- RIGHT SIDE: Sign (s), Desig Seal (d) & Text ---
        const rightX = 130; // വലതുവശത്തെ അലൈൻമെൻ്റ് തുടങ്ങുന്ന സ്ഥലം

        // 1. Designation Seal (d) - ടെക്സ്റ്റിന് മുകളിലായി വരാൻ
        if (imgData.desigSeal) {
          // നീളമുള്ള റബ്ബർ സ്റ്റാമ്പ് ആയതുകൊണ്ട് വീതി 55mm നൽകി
          doc.addImage(
            imgData.desigSeal,
            "PNG",
            rightX - 5,
            footerY + 5,
            55,
            18,
          );
        }

        // 2. Ink Sign (s) - സീലിന് മുകളിൽ ഓവർലാപ്പ് ചെയ്ത് വരാൻ
        if (imgData.sign) {
          // Y കോർഡിനേറ്റ് കുറച്ച് നൽകി മുകളിലേക്ക് കയറ്റി വെക്കുന്നു
          doc.addImage(imgData.sign, "PNG", rightX + 5, footerY - 12, 35, 15);
        }

        // 3. Typed Text (Name, PEN, etc.) - സീലുകൾക്ക് താഴെയായി വരാൻ
        // സീലുകൾ ഇല്ലാത്തപ്പോഴും നല്ല ഗ്യാപ്പ് കിട്ടാൻ textY താഴേക്ക് മാറ്റി വെക്കുന്നു
        let textY = footerY + 30;

        doc.text(officerName, rightX + 5, textY);
        textY += 5;
        doc.text(`PEN ${pen}`, rightX + 5, textY);
        textY += 5;
        doc.text(desig, rightX + 5, textY);
        textY += 5;
        const splitSignOffice = doc.splitTextToSize(officeName, 60);
        doc.text(splitSignOffice, rightX + 5, textY);

        // ---------------------------------------------------------

        doc.save("Certificate.pdf");
      }
      function copyText() {
        const text = document.getElementById("certificate-content").innerText;
        navigator.clipboard.writeText(text).then(() => {
          alert("Certificate text copied to clipboard!");
        });
      }

      // പേജ് ലോഡ് ആകുമ്പോൾ സർട്ടിഫിക്കറ്റുകൾ കാണിക്കാൻ
      window.onload = function () {
        renderCertificates();
      };
    </script>
  </body>
</html>
