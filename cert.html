<!doctype html>
<html lang="ml">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>e-Certificate Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f4f7f6;
        margin: 0;
        padding: 20px;
      }

      .top-section {
        background: #fff;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        margin-bottom: 20px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 15px;
      }
      .input-group {
        display: flex;
        flex-direction: column;
      }
      label {
        font-weight: 600;
        font-size: 0.85em;
        color: #555;
        margin-bottom: 5px;
      }
      input[type="text"] {
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 14px;
      }

      .main-container {
        display: flex;
        gap: 20px;
      }

      .left-panel {
        width: 35%;
        background: #fff;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        height: fit-content;
      }

      /* Certificate List Styles */
      #checkboxContainer {
        max-height: 400px;
        overflow-y: auto;
        margin-bottom: 15px;
        padding-right: 5px;
      }
      .cert-item {
        display: flex;
        align-items: flex-start;
        margin-bottom: 10px;
        padding: 10px;
        background: #f9f9f9;
        border: 1px solid #e0e0e0;
        border-radius: 6px;
      }
      .cert-item input[type="checkbox"] {
        margin-top: 4px;
        margin-right: 10px;
        width: 18px;
        height: 18px;
        cursor: pointer;
      }
      .cert-text {
        font-size: 13px;
        color: #333;
        line-height: 1.4;
        flex-grow: 1;
        cursor: pointer;
      }
      .cert-actions {
        margin-left: 10px;
        display: flex;
        gap: 5px;
        flex-shrink: 0;
      }
      .action-btn {
        background: none;
        border: none;
        cursor: pointer;
        font-size: 14px;
        padding: 2px 5px;
        border-radius: 3px;
      }
      .action-btn:hover {
        background: #e0e0e0;
      }

      /* Add New Certificate Styles */
      .add-new-box {
        background: #f0f4f8;
        padding: 15px;
        border-radius: 6px;
        border: 1px dashed #0072ff;
      }
      textarea {
        width: 100%;
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
        resize: vertical;
        min-height: 60px;
        margin-bottom: 10px;
        font-family: inherit;
      }

      .actions {
        margin-top: 20px;
        display: flex;
        gap: 10px;
      }
      .btn {
        flex: 1;
        padding: 10px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
        font-size: 14px;
      }
      .btn-pdf {
        background: #d32f2f;
        color: white;
      }
      .btn-text {
        background: #1976d2;
        color: white;
      }
      .btn-add {
        background: #0072ff;
        color: white;
        width: 100%;
      }

      /* Right Panel - A4 Preview */
      .right-panel {
        width: 65%;
        display: flex;
        justify-content: center;
      }
      .a4-page {
        background: #fff;
        width: 210mm;
        min-height: 297mm; /* height മാറി പഴയതുപോലെ ആക്കി */
        padding: 15mm 20mm; /* മുകളിൽ നിന്നുള്ള സ്പേസ് അല്പം കുറച്ചു */
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        box-sizing: border-box;
        position: relative;
      }
      .cert-header {
        font-family: "Times New Roman", Times, serif;
        text-align: center;
        font-weight: bold;
        font-size: 1.4em;
        margin-bottom: 10px;
        text-transform: uppercase;
      }
      .cert-title {
        font-family: "Times New Roman", Times, serif;
        text-align: center;
        font-weight: bold;
        font-size: 1.2em;
        margin-bottom: 30px;
        text-decoration: underline;
      }
      .cert-body {
        font-family: "Times New Roman", Times, serif;
        line-height: 1.8;
        font-size: 14px;
        min-height: 150mm;
        outline: none;
        background: #fafafa;
        padding: 10px;
        border-radius: 4px;
      }
      .cert-body ol {
        padding-left: 20px;
        margin: 0;
      }
      .cert-body li {
        margin-bottom: 10px;
        text-align: justify;
      }

      .cert-footer {
        font-family: "Times New Roman", Times, serif;
        display: flex;
        justify-content: space-between;
        margin-top: 40px;
        font-size: 14px;
      }
      .date-place {
        margin-top: 50px;
      }
      .signature-area {
        text-align: center;
        width: 250px;
      }
      .sign-space {
        height: 70px;
      }
      .designation,
      .pen-number {
        font-weight: bold;
        margin: 2px 0;
      }
      .placeholder-text {
        color: #888;
        font-style: italic;
      }
      /* പുതിയ ഇമേജ് അപ്‌ലോഡ് ബോക്സ് ഡിസൈൻ */
      .image-upload-box {
        background: #e8f5e9;
        padding: 15px;
        border-radius: 8px;
        border: 1px dashed #2e7d32;
        margin-top: 20px;
      }
      .image-upload-box h4 {
        color: #2e7d32;
        margin-top: 0;
        margin-bottom: 15px;
        font-size: 14px;
        border-bottom: 1px solid #c8e6c9;
        padding-bottom: 8px;
      }
      .file-group {
        margin-bottom: 15px;
        display: flex;
        flex-direction: column;
        gap: 5px;
      }
      .file-group label {
        font-weight: 600;
        font-size: 13px;
        color: #333;
      }
      .file-group .hint {
        font-size: 11px;
        color: #666;
        font-weight: normal;
      }
      .file-input-styled {
        padding: 8px;
        background: #fff;
        border: 1px solid #a5d6a7;
        border-radius: 4px;
        font-size: 13px;
        cursor: pointer;
        width: 100%;
        box-sizing: border-box;
      }
      .btn-clear {
        background: #ffebee;
        color: #c62828;
        border: 1px solid #ffcdd2;
        padding: 8px 15px;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
        font-size: 12px;
        width: 100%;
        margin-top: 5px;
        transition: 0.3s;
      }
      .btn-clear:hover {
        background: #ffcdd2;
      }
    </style>
  </head>
  <body>
    <div class="top-section">
      <div class="input-group">
        <label>Office Name</label>
        <input
          type="text"
          id="officeInput"
          placeholder="Institution Name"
          oninput="
            updatePreview();
            saveProfile();
          "
        />
      </div>
      <div class="input-group">
        <label>Officer Name</label>
        <input
          type="text"
          id="officerInput"
          placeholder="DDO Name"
          oninput="
            updatePreview();
            saveProfile();
          "
        />
      </div>
      <div class="input-group">
        <label>Designation</label>
        <input
          type="text"
          id="desigInput"
          placeholder="DDO Designation"
          oninput="
            updatePreview();
            saveProfile();
          "
        />
      </div>
      <div class="input-group">
        <label>PEN Number</label>
        <input
          type="text"
          id="penInput"
          placeholder="DDO PEN"
          oninput="
            updatePreview();
            saveProfile();
          "
        />
      </div>
    </div>

    <div class="main-container">
      <div class="left-panel">
        <h3 style="margin-top: 0; margin-bottom: 15px; font-size: 16px">
          Select Certificates
        </h3>

        <div id="checkboxContainer"></div>

        <div class="add-new-box">
          <label>Add New Certificate Master</label>
          <textarea
            id="newCertText"
            placeholder="പുതിയ സർട്ടിഫിക്കറ്റ് ഇവിടെ ടൈപ്പ് ചെയ്യുക..."
          ></textarea>
          <button class="btn btn-add" onclick="addCertificate()">
            + Add to List
          </button>
        </div>
        <div class="image-upload-box">
          <h4>Add Images for Manual Signing (Optional)</h4>

          <div class="file-group">
            <label>Ink Signature <span class="hint">(Max 15KB)</span></label>
            <input
              type="file"
              class="file-input-styled"
              id="signInput"
              accept="image/*"
              onchange="handleImageUpload(this, 'sign')"
            />
          </div>

          <div class="file-group">
            <label>Designation Seal <span class="hint">(Max 15KB)</span></label>
            <input
              type="file"
              class="file-input-styled"
              id="desigSealInput"
              accept="image/*"
              onchange="handleImageUpload(this, 'desigSeal')"
            />
          </div>

          <div class="file-group">
            <label
              >Office Round Seal <span class="hint">(Max 15KB)</span></label
            >
            <input
              type="file"
              class="file-input-styled"
              id="sealInput"
              accept="image/*"
              onchange="handleImageUpload(this, 'seal')"
            />
          </div>

          <button class="btn-clear" onclick="clearImages()">
            Clear All Images
          </button>
        </div>
        <div class="actions">
          <button class="btn btn-pdf" onclick="downloadPDF()">
            Download PDF
          </button>
          <button class="btn btn-text" onclick="copyText()">
            Copy as Text
          </button>
        </div>
      </div>

      <div class="right-panel">
        <div class="a4-page" id="certificate-content">
          <div class="cert-header" id="outOffice">
            Office Name
          </div>
          <div class="cert-title">CERTIFICATES</div>

          <div class="cert-body" id="outText" contenteditable="true">
            <div class="placeholder-text">
              Please select certificates from the left panel...
            </div>
          </div>

          <div class="cert-footer">
            <div class="date-place">
              <b>Dated:</b> <span id="currentDate"></span>
            </div>
            <div class="signature-area">
              <div class="sign-space"></div>
              <p class="designation" id="outOfficer">DDO Name</p>
              <p class="pen-number">PEN <span id="outPen">DDO PEN</span></p>
              <p class="designation" id="outDesig">DDO designation</p>
              <p class="designation" id="outOfficeSign">
                Office Name
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>
<div id="counterContainer" style="display: none; text-align: center; font-size: 14px; color: #4b5563; margin-top: 15px; padding: 10px; background-color: #e0e7ff; border-radius: 8px;">
            Count: <span id="countDisplay" style="font-weight: 900; color: #4f46e5; font-size: 16px;">0</span>
        </div>
    <script>
      // അപ്‌ലോഡ് ചെയ്ത ഇമേജ് ഡാറ്റ സ്റ്റോർ ചെയ്യാൻ
      let imgData = {
        sign: null,
        seal: null,
        desigSeal: null,
      };

      // ഫയൽ അപ്‌ലോഡ് ഹാൻഡിൽ ചെയ്യാനും Base64 ആക്കാനും (20KB ലിമിറ്റോടെ)
      function handleImageUpload(input, type) {
        const file = input.files[0];

        if (file) {
          // 1. സൈസ് ചെക്ക് ചെയ്യുന്നു (15 KB = 15 * 1024 Bytes)
          const maxSizeInBytes = 15 * 1024;

          if (file.size > maxSizeInBytes) {
            // 15 KB ക്ക് മുകളിലാണെങ്കിൽ അലർട്ട് കാണിക്കുന്നു
            let currentSize = Math.round(file.size / 1024);
            alert(
              "ക്ഷമിക്കണം! " +
                type.toUpperCase() +
                " ഇമേജിന്റെ സൈസ് 15 KB യിൽ താഴെ ആയിരിക്കണം.\nനിങ്ങൾ തിരഞ്ഞെടുത്ത ഫയലിന്റെ സൈസ്: " +
                currentSize +
                " KB ആണ്.",
            );

            // തെറ്റായ ഫയൽ സെലക്ട് ചെയ്തത് ബോക്സിൽ നിന്നും ഒഴിവാക്കാൻ
            input.value = "";
            return; // ഇവിടെ വെച്ച് ഈ പ്രോസസ്സ് നിർത്തുന്നു
          }

          // 2. സൈസ് 15 KB യിൽ താഴെയാണെങ്കിൽ മാത്രം താഴെയുള്ള കോഡ് വർക്ക് ആകും
          const reader = new FileReader();
          reader.onload = function (e) {
            // Base64 ഡാറ്റ വേരിയബിളിലേക്ക് സേവ് ചെയ്യുന്നു
            imgData[type] = e.target.result;
            alert(
              type.toUpperCase() +
                " image uploaded successfully. Download PDF to see it.",
            );
          };
          reader.readAsDataURL(file);
        }
      }

      // അപ്‌ലോഡ് ചെയ്ത ഇമേജുകൾ ക്ലിയർ ചെയ്യാൻ (ഇതിൽ മാറ്റമില്ല)
      function clearImages() {
        imgData = { sign: null, seal: null, desigSeal: null };
        document.getElementById("signInput").value = "";
        document.getElementById("sealInput").value = "";
        document.getElementById("desigSealInput").value = "";
        alert("All uploaded images cleared.");
      }
      document.getElementById("currentDate").innerText =
        new Date().toLocaleDateString("en-GB");

      // ഡിഫോൾട്ട് സർട്ടിഫിക്കറ്റുകൾ (ലോക്കൽ സ്റ്റോറേജിൽ ഒന്നുമില്ലെങ്കിൽ ഇത് വരും)
      const defaultCerts = [
        "Certified that the NPS particulars of this bill verified and found in accordance with Circular No. 68/2025/Fin dated 03.09.2025.",
        "Certified that the SLI and GIS particulars of this bill verified and found as per the slab.",
        "Certified that the Salary for February 2026 of all employees of this office has been claimed.",
        "Certified that Statutory Deductions have been made.",
        "Certified that the Festival Allowance/Bonus/Advance for All employees (Including retired employees) of this office has been claimed and disbursed to their respective TSB/Bank account.",
        "Certified that the Salary of All employees included in the Bill has been credited to their respective e-TSB / Bank Account.",
        "Certified that Gross and Net Amount of each claim has been detailed and shown in bill and Net claim amount has been credited to E-TSB Account.",
        "Certified that Negative Amount is not claimed in the submitted bills.",
        "Certified that 1/12th of the calculated annual Income Tax has been deducted from the salaries of all employees who are liable to pay tax.",
        "Certified that no employee in this bill participated in the strike held on 12-02-2026. Therefore, no salary deduction is required to be made on account of 'dies-non' as per G.O.(P) No. 2/2026/GAD dated 11-02-2026.",
      ];

      // ലോക്കൽ സ്റ്റോറേജിൽ നിന്നും സർട്ടിഫിക്കറ്റുകൾ എടുക്കുന്നു
      let savedCertificates =
        JSON.parse(localStorage.getItem("myCertificates")) || defaultCerts;

      // UI-ൽ സർട്ടിഫിക്കറ്റ് ലിസ്റ്റ് കാണിക്കാനുള്ള ഫംഗ്ഷൻ
      function renderCertificates() {
        const container = document.getElementById("checkboxContainer");
        container.innerHTML = ""; // നിലവിലുള്ളവ ക്ലിയർ ചെയ്യുന്നു

        savedCertificates.forEach((cert, index) => {
          const label = document.createElement("label");
          label.className = "cert-item";

          label.innerHTML = `
                <input type="checkbox" value="${index}" onchange="buildPreview()">
                <span class="cert-text" onclick="this.previousElementSibling.click()">${cert}</span>
                <div class="cert-actions">
                    <button class="action-btn" title="Edit" onclick="editCertificate(${index}, event)">✏️</button>
                    <button class="action-btn" title="Delete" onclick="deleteCertificate(${index}, event)">🗑️</button>
                </div>
            `;
          container.appendChild(label);
        });
        buildPreview(); // ലിസ്റ്റ് മാറുമ്പോൾ പ്രിവ്യൂവും അപ്ഡേറ്റ് ചെയ്യുന്നു
      }

      // പുതിയ സർട്ടിഫിക്കറ്റ് ചേർക്കാൻ
      function addCertificate() {
        const newText = document.getElementById("newCertText").value.trim();
        if (newText !== "") {
          savedCertificates.push(newText);
          saveData();
          document.getElementById("newCertText").value = ""; // ടെക്സ്റ്റ് ബോക്സ് ക്ലിയർ ചെയ്യുന്നു
        }
      }

      // സർട്ടിഫിക്കറ്റ് എഡിറ്റ് ചെയ്യാൻ
      function editCertificate(index, event) {
        event.preventDefault(); // ചെക്ക് ബോക്സ് ടിക്ക് ആവാതിരിക്കാൻ
        const currentText = savedCertificates[index];
        const updatedText = prompt("Edit Certificate:", currentText);

        if (updatedText !== null && updatedText.trim() !== "") {
          savedCertificates[index] = updatedText.trim();
          saveData();
        }
      }

      // സർട്ടിഫിക്കറ്റ് ഡിലീറ്റ് ചെയ്യാൻ
      function deleteCertificate(index, event) {
        event.preventDefault();
        if (confirm("Are you sure you want to delete this certificate?")) {
          savedCertificates.splice(index, 1);
          saveData();
        }
      }

      // ഡാറ്റ ലോക്കൽ സ്റ്റോറേജിൽ സേവ് ചെയ്യാനും UI പുതുക്കാനും
      function saveData() {
        localStorage.setItem(
          "myCertificates",
          JSON.stringify(savedCertificates),
        );
        renderCertificates();
      }

      // 1. ഇൻപുട്ടിൽ ടൈപ്പ് ചെയ്യുന്നത് പ്രിവ്യൂവിൽ കാണിക്കാൻ
      function updatePreview() {
        // ബോക്സ് കാലിയാണെങ്കിൽ പ്രിവ്യൂവിൽ ഒരു ഡിഫോൾട്ട് പേര് കാണിക്കാൻ (|| ഉപയോഗിച്ച്)
        document.getElementById("outOffice").innerText =
          document.getElementById("officeInput").value || "Office Name";
        document.getElementById("outOfficer").innerText =
          document.getElementById("officerInput").value || "Officer Name";
        document.getElementById("outDesig").innerText =
          document.getElementById("desigInput").value || "Designation";
        document.getElementById("outPen").innerText =
          document.getElementById("penInput").value || "PEN Number";

        // താഴെയുള്ള ഓഫീസിന്റെ പേരും മാറ്റുന്നു (ചില ഡിസൈനുകളിൽ ഇത് ഉപയോഗിക്കുന്നുണ്ട്)
        const outOfficeSign = document.getElementById("outOfficeSign");
        if (outOfficeSign)
          outOfficeSign.innerText =
            document.getElementById("officeInput").value || "Office Name";
      }

      // 2. ടൈപ്പ് ചെയ്യുന്ന വിവരങ്ങൾ ലോക്കൽ സ്റ്റോറേജിലേക്ക് സേവ് ചെയ്യാൻ
      function saveProfile() {
        const profile = {
          office: document.getElementById("officeInput").value,
          officer: document.getElementById("officerInput").value,
          desig: document.getElementById("desigInput").value,
          pen: document.getElementById("penInput").value,
        };
        localStorage.setItem("myProfile", JSON.stringify(profile));
      }

      // 3. പേജ് ലോഡ് ആകുമ്പോൾ സേവ് ചെയ്ത വിവരങ്ങൾ തിരികെ എടുക്കാൻ
      function loadProfile() {
        const savedProfile = JSON.parse(localStorage.getItem("myProfile"));
        if (savedProfile) {
          document.getElementById("officeInput").value =
            savedProfile.office || "";
          document.getElementById("officerInput").value =
            savedProfile.officer || "";
          document.getElementById("desigInput").value =
            savedProfile.desig || "";
          document.getElementById("penInput").value = savedProfile.pen || "";
          // സേവ് ചെയ്ത ഡാറ്റ വെച്ച് പ്രിവ്യൂ അപ്ഡേറ്റ് ചെയ്യുന്നു
          updatePreview();
        }
      }

      // ടിക്ക് ചെയ്തവ പ്രിവ്യൂവിൽ കൊണ്ടുവരാൻ
      function buildPreview() {
        const checkboxes = document.querySelectorAll(
          '#checkboxContainer input[type="checkbox"]:checked',
        );
        const textDiv = document.getElementById("outText");

        if (checkboxes.length === 0) {
          textDiv.innerHTML =
            '<div class="placeholder-text">Please select certificates from the left panel...</div>';
          return;
        }

        let html = "<ol>";
        checkboxes.forEach((cb) => {
          const certIndex = cb.value;
          html += `<li>${savedCertificates[certIndex]}</li>`;
        });
        html += "</ol>";

        textDiv.innerHTML = html;
      }

      function downloadPDF() {
        const { jsPDF } = window.jspdf;
        // compress: true നൽകിയിട്ടുണ്ട് (സൈസ് കുറയാൻ)
        const doc = new jsPDF({
          orientation: "portrait",
          unit: "mm",
          format: "a4",
          compress: true,
        });

        const officeName = document.getElementById("officeInput").value;
        const officerName = document.getElementById("officerInput").value;
        const desig = document.getElementById("desigInput").value;
        const pen = document.getElementById("penInput").value;
        const dateStr = document.getElementById("currentDate").innerText;

        let y = 30;
        const pageWidth = doc.internal.pageSize.getWidth();

        // 1. ഹെഡിങ് (Office Name)
        doc.setFont("times", "bold");
        doc.setFontSize(14);
        const splitOffice = doc.splitTextToSize(
          officeName.toUpperCase(),
          pageWidth - 40,
        );
        splitOffice.forEach((line) => {
          doc.text(line, pageWidth / 2, y, { align: "center" });
          y += 7;
        });

        y += 5;
        // 2. ടൈറ്റിൽ (CERTIFICATES)
        doc.setFontSize(12);
        doc.text("CERTIFICATES", pageWidth / 2, y, { align: "center" });
        const textWidthTitle = doc.getTextWidth("CERTIFICATES");
        doc.line(
          (pageWidth - textWidthTitle) / 2,
          y + 1,
          (pageWidth + textWidthTitle) / 2,
          y + 1,
        );

        y += 15;

        // 3. സർട്ടിഫിക്കറ്റ് കണ്ടൻ്റ് (Justified & Hanging Indent)
        doc.setFont("times", "normal");
        const listItems = document.querySelectorAll("#outText li");
        if (listItems.length === 0) {
          alert("Please select certificates.");
          return;
        }

        listItems.forEach((li, index) => {
          const numberStr = `${index + 1}.`;
          const textStr = li.innerText;

          // ടെക്സ്റ്റിന് മാത്രമുള്ള വീതി (മാർജിനും നമ്പറിനുള്ള ഗ്യാപ്പും കുറച്ചു)
          const textWidth = 162;
          const lines = doc.splitTextToSize(textStr, textWidth);
          const paraHeight = lines.length * 6; // പാരഗ്രാഫിൻ്റെ ഉയരം

          // ബ്ലാങ്ക് സ്പേസ് ഒഴിവാക്കാൻ താഴെയുള്ള ലിമിറ്റ് 240 ൽ നിന്നും 275 ആക്കി മാറ്റി
          if (y + paraHeight > 275) {
            doc.addPage();
            y = 20;
          }

          // ക്രമ നമ്പർ മാർജിനിൽ പ്രിൻ്റ് ചെയ്യുന്നു (X: 20)
          doc.text(numberStr, 20, y);

          // ടെക്സ്റ്റ് Justify ചെയ്ത് പ്രിൻ്റ് ചെയ്യുന്നു (X: 28)
          doc.text(textStr, 28, y, { align: "justify", maxWidth: textWidth });

          y += paraHeight + 4; // അടുത്ത വരിയിലേക്കുള്ള ഗ്യാപ്പ്
        });

        // ---------------------------------------------------------
        // 4. സീലുകളും ഒപ്പും ക്രമീകരിക്കുന്ന ഭാഗം
        // ---------------------------------------------------------

        y += 10;

        // താഴെ ഒപ്പിടാൻ 40mm സ്ഥലം ഇല്ലെങ്കിൽ പുതിയ പേജ് എടുക്കും
        if (y + 40 > 280) {
          doc.addPage();
          y = 30;
        }

        const footerY = y;

        // --- LEFT SIDE: Office Round Seal & Date ---
        if (imgData.seal) {
          doc.addImage(
            imgData.seal,
            "PNG",
            20,
            footerY,
            30,
            30,
            undefined,
            "FAST",
          );
        }

        doc.setFont("times", "bold");
        doc.setFontSize(11);
        doc.text(`Dated: ${dateStr}`, 20, footerY + 35);

        // --- RIGHT SIDE: Signature Block (Center Aligned within the right margin) ---
        const rightCenter = 165; // വലതുവശത്തെ ബ്ലോക്കിൻ്റെ മധ്യഭാഗം (X axis)

        if (imgData.desigSeal) {
          // 55mm വീതിയുള്ള സീൽ നടുക്ക് വരാൻ -27.5 കുറയ്ക്കുന്നു
          doc.addImage(
            imgData.desigSeal,
            "PNG",
            rightCenter - 27.5,
            footerY + 5,
            55,
            18,
            undefined,
            "FAST",
          );
        }

        if (imgData.sign) {
          // 35mm വീതിയുള്ള ഒപ്പ് നടുക്ക് വരാൻ -17.5 കുറയ്ക്കുന്നു
          doc.addImage(
            imgData.sign,
            "PNG",
            rightCenter - 17.5,
            footerY - 12,
            35,
            15,
            undefined,
            "FAST",
          );
        }

        let textY = footerY + 30;

        // ടെക്സ്റ്റുകൾ എല്ലാം നടുക്കായി (align: "center") പ്രിൻ്റ് ചെയ്യുന്നു
        doc.text(officerName, rightCenter, textY, { align: "center" });
        textY += 5;
        doc.text(`PEN ${pen}`, rightCenter, textY, { align: "center" });
        textY += 5;
        doc.text(desig, rightCenter, textY, { align: "center" });
        textY += 5;

        // വലിയ ഓഫീസ് പേര് വന്നാൽ അതിനെ രണ്ടോ മൂന്നോ വരികളാക്കി നടുക്ക് അലൈൻ ചെയ്യുന്നു
        const splitSignOffice = doc.splitTextToSize(officeName, 60);
        splitSignOffice.forEach((line) => {
          doc.text(line, rightCenter, textY, { align: "center" });
          textY += 5;
        });

        doc.save("Certificate.pdf");
        incrementCounter();
      }
      function copyText() {
        const text = document.getElementById("certificate-content").innerText;
        navigator.clipboard.writeText(text).then(() => {
          alert("Certificate text copied to clipboard!");
        });
        incrementCounter();
      }
const counterNamespace = "cert-rubundroid"; 
    const counterKey = "total-calculations";

    // 1. പേജ് തുറക്കുമ്പോൾ നിലവിലെ കൗണ്ട് കാണിക്കാൻ
    function getInitialCount() {
      fetch(`https://api.counterapi.dev/v1/${counterNamespace}/${counterKey}`)
        .then((response) => response.json())
        .then((data) => {
          if (data.count && data.count > 0) {
            document.getElementById("countDisplay").innerText = data.count;
            document.getElementById("counterContainer").style.display = "block";
          }
        })
        .catch((error) => {
          console.log("Counter blocked by browser or ad-blocker.");
        });
    }

    // 2. ബട്ടൺ അമർത്തുമ്പോൾ കൗണ്ട് 1 കൂട്ടാൻ
    function incrementCounter() {
      fetch(`https://api.counterapi.dev/v1/${counterNamespace}/${counterKey}/up`)
        .then((response) => response.json())
        .then((data) => {
          if (data.count) {
            document.getElementById("countDisplay").innerText = data.count;
            document.getElementById("counterContainer").style.display = "block";
          }
        })
        .catch((error) => console.log("Counter increment failed."));
    }

      window.onload = function () {
        loadProfile(); // പ്രൊഫൈൽ ഡാറ്റ ലോഡ് ചെയ്യുന്നു
        renderCertificates(); // സർട്ടിഫിക്കറ്റുകൾ ലോഡ് ചെയ്യുന്നു
        getInitialCount;
      };
    </script>
  </body>
